name: Pipeline semanal — extração + carga + IA

# Disparado pelo n8n (HTTP Request -> POST .../dispatches) antes do envio do
# briefing semanal. Também pode ser rodado manualmente pela aba Actions.
on:
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python -m src.run_pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
